<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PsyST Lab</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>PsyST Lab</h1>
    <select id="mod-sel" class="mod-sel"></select>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="live">实时</button>
    <button class="tab" data-tab="results">结果</button>
    <button class="tab" data-tab="compare">对比</button>
    <button class="tab" data-tab="launch">启动</button>
    <button class="tab" data-tab="settings">设置</button>
  </nav>
  <div class="run-status-pill" id="status-pill"><span class="dot"></span><span id="status-text">检查中…</span></div>
</header>

<main>
  <!-- ============ 实时 ============ -->
  <section id="tab-live" class="tab-panel active">
    <div class="kpi-row">
      <div class="kpi"><span class="label">状态</span><span id="live-state" class="value">—</span></div>
      <div class="kpi"><span class="label">当前组</span><span id="live-group" class="value">—</span></div>
      <div class="kpi"><span class="label">进度</span><span id="live-progress" class="value">—</span></div>
      <div class="kpi"><span class="label">最新 run</span><span id="live-tag" class="value">—</span></div>
    </div>
    <div class="live-actions">
      <button id="force-stop-btn" class="danger" disabled>强制停止 + 删除当前 run</button>
      <span id="force-stop-msg" class="muted small"></span>
    </div>
    <div class="chart-card">
      <header><h3>实时日志</h3><span class="muted small">每 3s 自动刷新</span></header>
      <pre id="live-log" class="log-viewer">（等待运行…）</pre>
    </div>
  </section>

  <!-- ============ 结果 ============ -->
  <section id="tab-results" class="tab-panel">
    <div class="empty-state" id="results-empty">
      <div class="empty-card"><h2>暂无运行记录</h2><p>先在「启动」标签配置并运行一次实验。</p></div>
    </div>
    <div id="results-content" class="hidden">
      <div class="meta-bar">
        <select id="run-select"></select>
        <span id="meta-model" class="chip"></span>
        <span id="meta-pi" class="chip"></span>
        <span id="meta-calls" class="chip"></span>
      </div>
      <div id="sort-bar" class="sort-bar" style="display:none"><span class="muted small">排序:</span><span id="sort-chips"></span><button class="sm" onclick="sortQueue=[];renderAll();">✕ 清除</button><button class="sm" onclick="exportCSV()" title="导出 CSV">⬇ 导出</button></div>
      <section class="kpis" id="kpi-row"></section>
      <section class="grid" id="chart-grid"></section>
      <section class="table-card" id="table-section">
        <header><h3 id="table-title">详情</h3></header>
        <div class="table-wrap"><table id="detail-table"><thead></thead><tbody></tbody></table></div>
      </section>
    </div>
  </section>

  <!-- ============ 对比 ============ -->
  <section id="tab-compare" class="tab-panel">
    <div class="chart-card">
      <header><h3>选择要对比的 run(多选)</h3><span class="muted small">勾选后自动生成横向对比表</span></header>
      <div id="compare-picker" class="compare-picker"></div>
    </div>
    <div class="chart-card">
      <header><h3>横向对比(每格 = accuracy)</h3><span class="muted small"><label><input type="checkbox" id="compare-re" onchange="renderCompareTable()"> 显示 RE</label> <button class="sm" onclick="exportCompareCSV()">⬇ 导出 CSV</button></span></header>
      <div class="table-wrap"><table id="compare-table" class="compare-table"></table></div>
    </div>
  </section>

  <!-- ============ 启动 ============ -->
  <section id="tab-launch" class="tab-panel">
    <div class="chart-card launch-card">
      <header><h3>配置并启动一次运行</h3><span id="launch-warn" class="muted small"></span></header>
      <div class="form-grid form-grid-5">
        <label>API 配置<select id="f-profile"></select></label>
        <label>keys<input id="f-nkeys" type="number" value="46"></label>
        <label>updates/key<input id="f-updates" type="number" value="4"></label>
        <label>试次数<input id="f-trials" type="number" value="10"></label>
        <label>k_repeats<input id="f-krepeats" type="number" value="3"></label>
      </div>
      <div class="profile-info" id="f-profile-info"></div>
      <div class="form-groups">
        <div class="form-groups-head">
          <span id="launch-desc" class="muted small"></span>
        </div>
        <div id="task-composer">
          <div class="palette">
            <span class="muted small">Features(点击看说明 / 拖入任务)</span>
            <div id="palette" class="palette-chips"></div>
          </div>
          <div id="palette-detail" class="palette-detail"></div>
          <div id="task-list"></div>
          <button id="add-task" class="ghost">+ 添加任务</button>
        </div>
      </div>
      <div class="form-actions">
        <button id="launch-btn" class="primary">启动运行</button>
        <span id="launch-msg" class="muted small"></span>
      </div>
    </div>
  </section>

  <!-- ============ 设置 ============ -->
  <section id="tab-settings" class="tab-panel">
    <div class="chart-card">
      <header><h3>已保存的 API 配置</h3><span class="muted small">密钥仅显示末四位;新增后可在「启动」标签选用</span></header>
      <div id="settings-profiles" class="settings-profiles"></div>
    </div>
    <div class="chart-card">
      <header><h3>添加 / 更新配置(同名覆盖)</h3></header>
      <div class="form-grid form-grid-4">
        <label>名称<input id="p-name" type="text" placeholder="deepseek"></label>
        <label>base_url<input id="p-baseurl" type="text" placeholder="https://api.deepseek.com"></label>
        <label>api_key<input id="p-apikey" type="password" placeholder="sk-..."></label>
        <label>model<input id="p-model" type="text" placeholder="deepseek-chat"></label>
      </div>
      <label class="form-full">
        <span>额外参数(YAML,可选)—— 例如 DeepSeek 关推理</span>
        <textarea id="p-extra" rows="3" placeholder="thinking:&#10;  type: disabled"></textarea>
      </label>
      <div class="form-actions">
        <button id="p-save" class="primary">保存</button>
        <span id="p-msg" class="muted small"></span>
      </div>
    </div>
  </section>
</main>

<footer class="small">PsyST Lab · runs/<span id="footer-module">pi_release</span>/</footer>
<script src="/app.js"></script>
</body>
</html>
