# Experiment definition
# ------------------------------------------------------------
# Defines the PI stress test, which groups to run, and how each
# group is evaluated. Edit `enabled` to scope a run.
#
# Load aligned with the PI-LLM benchmark (arXiv:2506.08184):
#   - 46 tracked keys (paper test1_updates standard)
#   - updates/key in the collapse zone (paper sweeps 2..400; 97 is mid-high)
#   - sample_replacement = 0  (handled in pi_test.generate)
#   - temperature = 0, max_tokens = 1024 (set in config.yaml)

pi_test:
  n_keys: 46             # paper standard (test1_updates: n_tracked_keys=[46])
  updates_per_key: 97    # paper collapse-zone point (sweep: 2,3,4,6,8,12,17,24,34,48,68,97,139,197,281,400)
  n_trials: 5            # distinct PI streams per group (reduced from 10 for runtime)
  seed: 42               # base RNG seed (each trial derives its own)

eval:
  k_repeats: 3           # API calls per (group, trial) -> averaged accuracy
  measure_cp: true       # Context Preservation probe (unrelated prior fact)
  measure_robustness: true  # delete 1 char from injection, re-run, check RE delta

# Group enable flags. Disable groups to scope down a quick test run.
# IDs match think1.md (G0-G7 single-class, S1-S5 stacks).
groups:
  - { id: G0, name: "baseline",            enabled: true }
  - { id: G1, name: "semantic-forget",     enabled: true }
  - { id: G2, name: "mock-qa-reset",       enabled: true }   # paper's winner
  - { id: G3, name: "syntactic-cliff",     enabled: true }
  - { id: G4, name: "glitch-tokens",       enabled: true }   # biggest unknown
  - { id: G5, name: "unicode-bytes",       enabled: false }  # enable after G4
  - { id: G6, name: "self-generation",     enabled: true }
  - { id: G7, name: "query-engineering",   enabled: true }
  - { id: S3, name: "stack: mock+cliff+glitch", enabled: true }
  - { id: S5, name: "stack: full firepower",     enabled: true }
